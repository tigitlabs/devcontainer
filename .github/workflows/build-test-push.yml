---

name: "Build-Test-Push"

on:
  workflow_call:
    inputs:
      image:
        description: 'Image to build'
        required: true
        type: string
      tag:
        description: 'Tag to apply to the image'
        required: true
        type: string
      additional_tags:
        description: 'Additional comma-separated tags to publish for the same image build'
        required: false
        type: string
        default: ''
      base_image:
        description: 'Base image to use'
        type: string
        required: false
      publish:
        description: 'Whether to publish the built image to the registry'
        required: false
        type: boolean
        default: false
      registry:
        description: 'Registry to push to'
        required: false
        type: string
        default: 'ghcr.io'
    outputs:
      image_url:
        description: 'URL of the image'
        value: ${{ jobs.build-devcontainer-image.outputs.image_url }}

jobs:
  build-devcontainer-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_url: ${{ steps.image_metadata.outputs.image_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install devcontainer cli
        run: |
          npm install -g @devcontainers/cli
          devcontainer --version

      - name: Build the devcontainer image
        id: build_devcontainer_image
        run: |
          echo "Building the image: ${{ inputs.image }}:${{ inputs.tag }}"
          ./test/pre_build.sh ${{ inputs.image }} ${{ inputs.tag }} ${{ inputs.base_image }}

      - name: Test the image
        run: |
          echo "Testing the image"
          ./test/test_build.sh ${{ inputs.image }} ${{ inputs.tag }}

      - name: Image metadata
        id: image_metadata
        run: |
          echo "image_url=${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        if: ${{ inputs.publish }}
        run: |
          set -euo pipefail

          image_name="${{ inputs.image }}:${{ inputs.tag }}"
          published_image="${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image }}"

          echo "Publishing ${image_name} to ${published_image}"
          docker tag "${image_name}" "${published_image}:${{ inputs.tag }}"
          docker push "${published_image}:${{ inputs.tag }}"

          if [[ -n "${{ inputs.additional_tags }}" ]]; then
            IFS=',' read -ra extra_tags <<< "${{ inputs.additional_tags }}"
            for tag in "${extra_tags[@]}"; do
              tag="$(echo "${tag}" | xargs)"
              if [[ -z "${tag}" || "${tag}" == "${{ inputs.tag }}" ]]; then
                continue
              fi

              docker tag "${image_name}" "${published_image}:${tag}"
              docker push "${published_image}:${tag}"
            done
          fi
