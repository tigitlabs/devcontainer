name: "Base Image CI"

on:
  pull_request:
    branches: [dev, main]
    paths:
      - src/base-ubuntu/**
      - test/**
      - .github/workflows/**
      - .github/actions/**
      - README.md
      - Makefile
  push:
    branches: [dev, main]
    tags: ['v*.*.*']
    paths:
      - src/base-ubuntu/**
      - test/**
      - .github/workflows/**
      - .github/actions/**
      - README.md
      - Makefile
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prepare-metadata:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.plan.outputs.publish }}
      primary_tag: ${{ steps.plan.outputs.primary_tag }}
      additional_tags: ${{ steps.plan.outputs.additional_tags }}
    steps:
      - name: Plan image tags
        id: plan
        run: |
          set -euo pipefail

          sanitize_tag() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//'
          }

          short_sha="${GITHUB_SHA::12}"
          publish="false"
          primary_tag=""
          additional_tags=""

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            primary_tag="$(sanitize_tag "pr-${{ github.event.pull_request.number }}-${short_sha}")"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            primary_tag="$(sanitize_tag "${GITHUB_REF_NAME}")"
            additional_tags="sha-${short_sha}"
            publish="true"

            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              additional_tags="${additional_tags},latest"
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            primary_tag="$(sanitize_tag "${GITHUB_REF_NAME}")"
            additional_tags="sha-${short_sha}"
            publish="true"

            if [[ "${primary_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              additional_tags="${additional_tags},v${major}.${minor},v${major},latest"
            fi
          else
            echo "Unsupported event or ref type"
            exit 1
          fi

          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${primary_tag}" >> "$GITHUB_OUTPUT"
          echo "additional_tags=${additional_tags}" >> "$GITHUB_OUTPUT"

  base-ubuntu:
    needs: prepare-metadata
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-test-push.yml
    with:
      image: base-ubuntu
      tag: ${{ needs.prepare-metadata.outputs.primary_tag }}
      additional_tags: ${{ needs.prepare-metadata.outputs.additional_tags }}
      publish: ${{ needs.prepare-metadata.outputs.publish == 'true' }}
